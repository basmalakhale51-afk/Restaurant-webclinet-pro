<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <!-- icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="../Setting/setting.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">🍔 Bites & Vibes</div>
        <nav>
            <a href="../Home/index.html" class="active">Home</a>
            <a href="../Menu/menu.html">Menu</a>
            <a href="../Cart/cart.html">Cart</a>
            <a href="../History/history.html">History</a>
            <a href="contact.html">Contact Us</a>
            <button id="themeBtn">🌙</button>
        </nav>
    </header>

    <section class="contact-section">

        <!-- LEFT SIDE -->
        <div class="contact-form">

            <h1>Contact Us</h1>

            <form id="contactForm">

                <label>Full Name</label>
                <div class="input-box">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" id="name"placeholder="Enter your full name">
                </div>

                <label>Email</label>
                <div class="input-box">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email"placeholder="Enter your email">
                </div>

                <label>Message</label>
                <textarea id="message"placeholder="Type your message...."></textarea>

                <button type="submit">Send Message</button>

                <p id="responseMessage"></p>

            </form>
        </div>

        <!-- RIGHT SIDE -->
        <div class="contact-info">

            <h2>OUR LOCATION</h2>

            <p>
                <i class="fa-solid fa-location-dot"></i>
                123 Bites&Vibes, Malibu, CA 90210
            </p>

            <p>
                <i class="fa-regular fa-envelope"></i>
                support@Bites&Vibes.com
            </p>

            <p>
                <i class="fa-solid fa-phone"></i>
                +1 234 567 8900
            </p>

            <img src="../image/map.jpg" alt="map">

        </div>

    </section>

    <script src="contact.js"></script>
    <script src="../Setting/setting.js"></script>
</body>
</html>
