<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>

    <link rel="stylesheet" href="checkout.css">
    <link rel="stylesheet" href="../Setting/setting.css">
</head>

<body>
        <!-- ================= NAVBAR ================= -->
    <header class="navbar">
        <div class="logo">🍔 Bites & Vibes</div>

        <nav>
            <a href="../Home/index.html">Home</a>
            <a href="../Menu/menu.html">Menu</a>
            <a href="../Cart/cart.html">Cart</a>
            <a href="../History/history.html">History</a>
            <a href="../Contact/contact.html">Contact Us</a>
            <button id="themeBtn">🌙</button>
        </nav>
    </header>
     <!-- ================= Checkout ================= -->
    <div class="checkout-container">

        <h1>Checkout</h1>


        <form id="checkoutForm">
        <fieldset>
            <label>Full Name </label>
            <input type="text" id="name" placeholder="Your Name">
            <br>

            <label>Phone Number </label>
            <input type="text" id="phone" placeholder="Phone Number">
            <br>

            <label>Address </label>
            <input type="text" id="address" placeholder="Address">
            <br>

            <label>Payment Method </label>
            <select id="payment">
                <option value="cash">Cash</option>
                <option value="Credit card">Credit Card</option>
                <option value="Vodafone cash">Vodafone Cash</option>
                <option value="InstaPay">InstaPay</option>
                <option value="QR Code">QR Code</option>
            </select>
            
            <br>
            <label>Order Type: </label>
            <select id="orderType">
                <option value="delivery">Delivery</option>
                <option value="pickup">Pickup</option>
            </select>

            <h3>
                Total:
                <span id="total">$0</span>
            </h3>

            <button type="submit">
                Confirm Order
            </button>       
        </fieldset>
        </form>

    </div>
        <!-- ================= FOOTER ================= -->
    <footer>
        <p>&copy; 2026 Bites & Vibes Restaurant. All rights reserved.</p>
    </footer>

    <script src="Checkout.js"></script>

    <button onclick="saveOrder()">Confirm Order</button>
    <script src="../Setting/setting.js"></script>
</body>
</html>
