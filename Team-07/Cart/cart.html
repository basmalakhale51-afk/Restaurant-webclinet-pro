<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Bites & Vibes</title>
    <link rel="stylesheet" href="cart.css">
    <link rel="stylesheet" href="../Setting/setting.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">🍔 Bites & Vibes</div>
        <nav>
            <a href="../Home/index.html">Home</a>
            <a href="../Menu/menu.html">Menu</a>
            <a href="cart.html">Cart</a>
            <a href="../History/history.html">History</a>
            <a href="../Contact/contact.html">Contact Us</a>
            <button id="themeBtn">🌙</button>
        </nav>
    </header>

    <!-- Main Layout: Items (Left) + Invoice (Right) -->
    <main class="cart-layout">
        
        <!--  قسم المنتجات (الكاردات) -->
        <section class="cart-items-section">
            <h2>Your Cart</h2>
            <div id="cart-items" class="items-list">
                <!-- العناصر هتظهر هنا أوتوماتيك -->
            </div>
        </section>

        <!--  قسم الفاتورة (زي الصورة بالضبط) -->
        <section class="invoice-section">
            <div class="invoice-box">
                <h3>Invoice 📄</h3>
                <div class="invoice-details">
                    <div class="row"><span>Subtotal</span><span id="subtotal">0</span></div>
                    <div class="row"><span>Shipping</span><span id="shipping">0</span></div>
                    <hr>
                    <div class="row total"><span>Total</span><span id="total">0</span></div>
                </div>
                <a href="../Checkout/Checkout.html">
                <button id="checkout-btn" class="checkout-btn" disabled>Checkout</button>
                </a>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Bites & Vibes Restaurant. All Rights Reserved</p>
    </footer>

    <script src="../Menu/data.js"></script>
    <script src="cart.js"></script>
    <script src="../Setting/setting.js"></script>
</body>
</html>
